name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Test
        run: pytest

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Derive version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify pyproject.toml version matches tag
        env:
          EXPECTED_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          python - <<'PY'
          import os, pathlib, sys, tomllib
          expected = os.environ["EXPECTED_VERSION"]
          actual = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          if actual != expected:
              print(f"::error::pyproject.toml version {actual!r} does not match tag v{expected}")
              sys.exit(1)
          print(f"pyproject.toml version matches tag: {actual}")
          PY

      - name: Extract changelog section
        env:
          RELEASE_VERSION: ${{ steps.tag.outputs.version }}
        run: python scripts/extract_changelog.py "$RELEASE_VERSION" > /tmp/release-notes.md

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "Optimal Task Planner $RELEASE_VERSION" \
            --notes-file /tmp/release-notes.md

  # Trusted Publishing (OIDC) — no tokens or secrets; PyPI trusts this repo,
  # workflow and environment. See RELEASING.md for the one-time PyPI setup.
  publish-pypi:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/optimal-task-planner
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-docker:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mavrikant/optimal-task-planner
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Standalone Windows executable — no Python required on the target machine.
  # `needs: release` because `gh release upload` requires the release to exist.
  windows-exe:
    needs: release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: pip install . pyinstaller
      - name: Build executable
        run: pyinstaller packaging/optimal-task-planner.spec
      - name: Smoke test executable
        shell: pwsh
        run: |
          Start-Process dist\optimal-task-planner.exe -ArgumentList `
            '--no-browser','--port','8765','--data-dir',"$env:TEMP\otp-smoke"
          $ok = $false
          foreach ($i in 1..60) {
            try {
              Invoke-WebRequest http://127.0.0.1:8765/api/health -UseBasicParsing | Out-Null
              $ok = $true; break
            } catch { Start-Sleep 1 }
          }
          # kill by name: the onefile bootstrap spawns a child that outlives
          # a Stop-Process on the parent PID
          Get-Process optimal-task-planner -ErrorAction SilentlyContinue |
            Stop-Process -Force
          if (-not $ok) { exit 1 }
      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $v = "$env:GITHUB_REF_NAME".TrimStart("v")
          Copy-Item dist\optimal-task-planner.exe "optimal-task-planner-$v-windows-x64.exe"
          gh release upload $env:GITHUB_REF_NAME "optimal-task-planner-$v-windows-x64.exe"

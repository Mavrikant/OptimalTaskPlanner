name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Test
        run: pytest

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Derive version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify pyproject.toml version matches tag
        env:
          EXPECTED_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          python - <<'PY'
          import os, pathlib, sys, tomllib
          expected = os.environ["EXPECTED_VERSION"]
          actual = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          if actual != expected:
              print(f"::error::pyproject.toml version {actual!r} does not match tag v{expected}")
              sys.exit(1)
          print(f"pyproject.toml version matches tag: {actual}")
          PY

      - name: Extract changelog section
        env:
          RELEASE_VERSION: ${{ steps.tag.outputs.version }}
        run: python scripts/extract_changelog.py "$RELEASE_VERSION" > /tmp/release-notes.md

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "LabPlanner $RELEASE_VERSION" \
            --notes-file /tmp/release-notes.md

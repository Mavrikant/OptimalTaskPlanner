name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type check
        run: mypy

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12", "3.13", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e .[dev]
      - name: Test
        run: pytest

  e2e:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - name: Install Optimal Task Planner
        run: pip install -e .[dev]
      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Start server
        run: |
          optimal-task-planner --port 8010 --data-dir /tmp/optimal-task-planner-e2e-data --no-browser &
          timeout 30 bash -c 'until curl -sf http://127.0.0.1:8010/api/health; do sleep 1; done'
      - name: Run e2e tests
        run: npx playwright test
        env:
          OPTIMAL_TASK_PLANNER_BASE_URL: http://127.0.0.1:8010
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install build tools
        run: pip install build twine
      - name: Build sdist and wheel
        run: python -m build
      - name: Check package metadata
        run: twine check dist/*

  # Build-only smoke for the Dockerfile (amd64, no push) so a broken image
  # surfaces on the PR instead of failing the tag-triggered release publish.
  docker:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t optimal-task-planner:ci .
      - name: Smoke test image
        run: |
          docker run -d --name otp -p 8000:8000 optimal-task-planner:ci
          timeout 60 bash -c 'until curl -sf http://127.0.0.1:8000/api/health; do sleep 1; done'
          docker exec otp whoami | grep -qx app
          docker rm -f otp

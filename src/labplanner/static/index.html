<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a202c" media="(prefers-color-scheme: dark)">
<title>LabPlanner</title>
<script>/* set the theme before first paint to avoid a flash */
(function () {
  var t = localStorage.getItem("labplanner.theme") ||
    (window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  document.documentElement.dataset.theme = t;
})();
</script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#128197;</text></svg>">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <div class="brand">
    <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="10" x2="21" y2="10"/>
      <line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/>
      <rect x="7" y="13" width="6" height="3" rx="1" fill="currentColor" stroke="none"/>
      <rect x="11" y="17" width="7" height="3" rx="1" fill="currentColor" stroke="none" opacity=".55"/>
    </svg>
    <div>
      <h1>LabPlanner</h1>
      <span class="sub" data-i18n="app.subtitle"></span>
    </div>
  </div>
  <div class="proj-menu" id="projMenu">
    <button id="projBtn" class="btn proj-btn" data-i18n-title="proj.menu"
            aria-haspopup="true" aria-expanded="false">
      <span data-icon="folder"></span><span id="projName" class="proj-name"></span>
      <span data-icon="chevron"></span>
    </button>
    <div class="proj-list" id="projList" role="menu" hidden></div>
    <input type="file" id="projImportFile" accept=".json" hidden>
  </div>
  <span id="saveState" class="save-state"></span>
  <button id="btnUndo" class="btn icon ghost" data-icon="undo" data-i18n-title="history.undo" disabled></button>
  <button id="btnRedo" class="btn icon ghost" data-icon="redo" data-i18n-title="history.redo" disabled></button>
  <button id="btnTheme" class="btn icon ghost" data-i18n-title="theme.toggle"></button>
  <button id="btnTour" class="btn icon ghost" data-icon="help" data-i18n-title="ob.tour"></button>
  <div class="lang-menu" id="langMenu">
    <button id="langBtn" class="btn lang-btn" data-i18n-title="lang.label" aria-haspopup="true" aria-expanded="false">
      <span class="flag" id="langFlag"></span>
      <span data-icon="chevron"></span>
    </button>
    <div class="lang-list" id="langList" role="menu" hidden></div>
  </div>
  <div class="solve-group">
    <button id="btnSolve" class="btn primary">
      <span data-icon="play"></span>
      <span data-i18n="app.solve"></span>
    </button>
    <button id="btnSolverOpts" class="btn icon ghost" data-icon="gear" data-i18n-title="solver.title"></button>
    <button id="btnInfoSolve" class="btn icon ghost" data-icon="info" data-i18n-title="info.solve.title"></button>
  </div>
</header>

<nav class="tabs" id="tabs" role="tablist">
  <button data-tab="resources" role="tab" aria-selected="false" aria-controls="tab-resources">
    <span class="tab-ic" data-icon="package"></span><span data-i18n="tabs.resources"></span>
  </button>
  <button data-tab="tasks" class="active" role="tab" aria-selected="true" aria-controls="tab-tasks">
    <span class="tab-ic" data-icon="tasks"></span><span data-i18n="tabs.tasks"></span>
  </button>
  <button data-tab="schedule" role="tab" aria-selected="false" aria-controls="tab-schedule">
    <span class="tab-ic" data-icon="gantt"></span><span data-i18n="tabs.schedule"></span>
  </button>
  <button data-tab="insights" role="tab" aria-selected="false" aria-controls="tab-insights">
    <span class="tab-ic" data-icon="chart"></span><span data-i18n="tabs.insights"></span>
  </button>
</nav>

<main id="main">

<section id="tab-resources" class="tab" role="tabpanel">
  <div class="res-layout">

    <div class="panel">
      <div class="panel-head">
        <h2 data-i18n="res.pool"></h2>
        <div class="row">
          <button id="btnAddEq" class="btn icon accent" data-icon="plus" data-i18n-title="res.addEquipment"></button>
          <button id="btnExportPool" class="btn icon" data-icon="download" data-i18n-title="res.exportPool"></button>
          <button id="btnImportPool" class="btn icon" data-icon="upload" data-i18n-title="res.importPool"></button>
          <button id="btnInfoPool" class="btn icon ghost" data-icon="info" data-i18n-title="info.title"></button>
          <input type="file" id="poolFile" accept=".json" hidden>
        </div>
      </div>
      <table id="eqTable">
        <thead><tr>
          <th data-i18n="res.colType"></th><th data-i18n="res.colUnits"></th><th class="col-actions"></th>
        </tr></thead>
        <tbody></tbody>
      </table>
      <div id="poolSummary" class="muted small"></div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h2 data-i18n="res.workCalendar"></h2>
        <button id="btnInfoCalendar" class="btn icon ghost" data-icon="info" data-i18n-title="info.title"></button>
      </div>
      <div class="stack">
        <div class="row wrap">
          <div class="field">
            <label data-i18n="res.workStart"></label>
            <select id="workStart"></select>
          </div>
          <div class="field">
            <label data-i18n="res.workEnd"></label>
            <select id="workEnd"></select>
          </div>
        </div>
        <div class="field">
          <label data-i18n="res.holidays"></label>
          <div id="holidayChips" class="chips"></div>
          <div class="row" style="margin-top:8px">
            <input type="date" id="holidayDate">
            <button id="btnAddHoliday" class="btn icon" data-icon="plus" data-i18n-title="res.add"></button>
          </div>
        </div>
        <div class="field">
          <label data-i18n="res.autofill"></label>
          <div class="row wrap">
            <select id="holidayCountry"></select>
            <select id="holidayYear"></select>
            <button id="btnFillHolidays" class="btn icon accent" data-icon="wand" data-i18n-title="res.autofill"></button>
          </div>
        </div>
      </div>
    </div>

    <div class="panel span-all">
      <div class="panel-head">
        <h2 data-i18n="res.unitAvailability"></h2>
        <div class="row">
          <select id="unitSelect"></select>
          <button id="btnClearUnit" class="btn icon" data-icon="eraser" data-i18n-title="res.clearUnit"></button>
          <button id="btnInfoAvail" class="btn icon ghost" data-icon="info" data-i18n-title="info.title"></button>
        </div>
      </div>
      <p class="muted small" data-i18n="res.availHint"></p>
      <div class="gridwrap" id="unitGridWrap"></div>
      <div class="legend">
        <span class="lu" data-i18n="legend.unavailable"></span>
        <span class="lw" data-i18n="legend.workHours"></span>
        <span class="lo" data-i18n="legend.offHours"></span>
      </div>
    </div>

  </div>
</section>

<section id="tab-tasks" class="tab active" role="tabpanel">
  <div class="tasks-layout">
    <div class="panel">
      <div class="row" style="margin-bottom:12px">
        <button id="btnAddTask" class="btn icon accent" data-icon="plus" data-i18n-title="tasks.add"></button>
        <button id="btnDupTask" class="btn icon" data-icon="copy" data-i18n-title="tasks.duplicate"></button>
        <button id="btnDelTask" class="btn icon danger" data-icon="trash" data-i18n-title="tasks.delete"></button>
        <span style="flex:1"></span>
        <button id="btnInfoTasks" class="btn icon ghost" data-icon="info" data-i18n-title="info.title"></button>
      </div>
      <input id="taskFilter" type="search" class="task-filter" data-i18n-placeholder="tasks.filterPlaceholder">
      <ul id="taskList"></ul>
      <div class="muted small" data-i18n="tasks.priorityHint"></div>
    </div>
    <div class="panel" id="editor"></div>
  </div>
</section>

<section id="tab-schedule" class="tab" role="tabpanel">
  <div class="schedule-head">
    <div id="status"></div>
    <div class="zoom-group" role="group">
      <button id="btnZoomOut" class="btn icon" data-icon="zoomOut" data-i18n-title="sch.zoomOut"></button>
      <button id="btnZoomFit" class="btn icon" data-icon="fit" data-i18n-title="sch.zoomFit"></button>
      <button id="btnZoomIn" class="btn icon" data-icon="zoomIn" data-i18n-title="sch.zoomIn"></button>
    </div>
    <button id="btnExport" class="btn icon" data-icon="download" data-i18n-title="sch.export" disabled></button>
    <button id="btnInfoSchedule" class="btn icon ghost" data-icon="info" data-i18n-title="info.title"></button>
  </div>
  <div id="ganttwrap"></div>
  <div class="panel" id="detailsPanel" hidden>
    <h2 data-i18n="sch.details"></h2>
    <div class="tablewrap">
      <table id="detailsTable">
        <thead><tr>
          <th>#</th>
          <th data-i18n="sch.colTask"></th>
          <th data-i18n="sch.colStart"></th>
          <th data-i18n="sch.colEnd"></th>
          <th data-i18n="sch.colDuration"></th>
          <th data-i18n="sch.colUnits"></th>
          <th data-i18n="sch.colDeadline"></th>
          <th data-i18n="sch.colStatus"></th>
          <th style="width:44px"></th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</section>

<section id="tab-insights" class="tab" role="tabpanel">
  <div id="insights"></div>
</section>

</main>

<footer>
  <div class="footer-inner">
    <div class="footer-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="10" x2="21" y2="10"/>
        <line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/>
      </svg>
      LabPlanner <span id="footVersion" class="muted"></span>
    </div>
    <span class="muted" data-i18n="footer.tagline"></span>
    <div class="footer-links">
      <span class="muted" data-i18n="footer.powered"></span>
      <a href="https://github.com/OWNER/labplanner/blob/main/LICENSE" target="_blank" rel="noopener" data-i18n="footer.license"></a>
      <a href="https://github.com/OWNER/labplanner" target="_blank" rel="noopener">
        <span data-icon="github"></span>GitHub
      </a>
    </div>
  </div>
</footer>

<div id="onboardBack" class="modal-back" hidden>
  <div class="modal onboard" role="dialog" aria-modal="true" aria-label="Introduction">
    <div class="ob-lang" id="obLang"></div>
    <div class="ob-icon" id="obIcon"></div>
    <h3 id="obTitle"></h3>
    <div class="info-body" id="obBody"></div>
    <div class="ob-dots" id="obDots"></div>
    <div class="ob-foot">
      <button id="obSkip" class="btn ghost" data-i18n="ob.skip"></button>
      <span style="flex:1"></span>
      <button id="obPrev" class="btn" data-i18n="ob.back"></button>
      <button id="obNext" class="btn primary" data-i18n="ob.next"></button>
      <button id="obStart" class="btn primary" data-i18n="ob.start" hidden></button>
    </div>
  </div>
</div>

<div id="tooltip" class="tooltip" hidden></div>

<div id="modalBack" class="modal-back" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <h3 id="modalTitle"></h3>
    <div id="modalBody" class="modal-body"></div>
    <div class="modal-foot">
      <button id="modalCancel" class="btn"></button>
      <button id="modalOk" class="btn primary"></button>
    </div>
  </div>
</div>

<div id="toasts" role="status" aria-live="polite"></div>

<script src="/static/i18n.js"></script>
<script src="/static/icons.js"></script>
<script src="/static/core.js"></script>
<script src="/static/shell.js"></script>
<script src="/static/resources.js"></script>
<script src="/static/tasks.js"></script>
<script src="/static/schedule.js"></script>
<script src="/static/insights.js"></script>
<script src="/static/boot.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LabPlanner</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#128197;</text></svg>">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <div class="brand">
    <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="10" x2="21" y2="10"/>
      <line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/>
      <rect x="7" y="13" width="6" height="3" rx="1" fill="currentColor" stroke="none"/>
      <rect x="11" y="17" width="7" height="3" rx="1" fill="currentColor" stroke="none" opacity=".55"/>
    </svg>
    <div>
      <h1>LabPlanner</h1>
      <span class="sub" data-i18n="app.subtitle"></span>
    </div>
  </div>
  <span id="saveState" class="save-state"></span>
  <div class="lang-switch" id="langSwitch" role="group" aria-label="Language">
    <button data-lang="en">EN</button><button data-lang="tr">TR</button>
  </div>
  <button id="btnSolve" class="btn primary">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
    <span data-i18n="app.solve"></span>
  </button>
</header>

<nav class="tabs" id="tabs">
  <button data-tab="resources" data-i18n="tabs.resources"></button>
  <button data-tab="tasks" class="active" data-i18n="tabs.tasks"></button>
  <button data-tab="schedule" data-i18n="tabs.schedule"></button>
</nav>

<main id="main">

<section id="tab-resources" class="tab">
  <div class="res-layout">

    <div class="panel">
      <div class="panel-head">
        <h2 data-i18n="res.pool"></h2>
        <div class="row">
          <button id="btnAddEq" class="btn accent" data-i18n="res.addEquipment"></button>
          <button id="btnExportPool" class="btn" data-i18n="res.exportPool"></button>
          <button id="btnImportPool" class="btn" data-i18n="res.importPool"></button>
          <input type="file" id="poolFile" accept=".json" hidden>
        </div>
      </div>
      <table id="eqTable">
        <thead><tr>
          <th data-i18n="res.colType"></th><th data-i18n="res.colUnits"></th><th class="col-actions"></th>
        </tr></thead>
        <tbody></tbody>
      </table>
      <div id="poolSummary" class="muted small"></div>
    </div>

    <div class="panel">
      <h2 data-i18n="res.workCalendar"></h2>
      <div class="row wrap" style="margin-bottom:14px">
        <div class="field">
          <label data-i18n="res.workStart"></label>
          <select id="workStart"></select>
        </div>
        <div class="field">
          <label data-i18n="res.workEnd"></label>
          <select id="workEnd"></select>
        </div>
      </div>
      <div class="field">
        <label data-i18n="res.holidays"></label>
        <div id="holidayChips" class="chips"></div>
        <div class="row" style="margin-top:8px">
          <input type="date" id="holidayDate">
          <button id="btnAddHoliday" class="btn" data-i18n="res.add"></button>
        </div>
      </div>
      <div class="field" style="margin-top:14px">
        <label data-i18n="res.autofill"></label>
        <div class="row wrap">
          <select id="holidayCountry"></select>
          <select id="holidayYear"></select>
          <button id="btnFillHolidays" class="btn" data-i18n="res.fill"></button>
        </div>
      </div>
    </div>

    <div class="panel span-all">
      <div class="panel-head">
        <h2 data-i18n="res.unitAvailability"></h2>
        <div class="row">
          <select id="unitSelect"></select>
          <button id="btnClearUnit" class="btn" data-i18n="res.clearUnit"></button>
        </div>
      </div>
      <p class="muted small" data-i18n="res.availHint"></p>
      <div class="gridwrap" id="unitGridWrap"></div>
      <div class="legend">
        <span class="lu" data-i18n="legend.unavailable"></span>
        <span class="lw" data-i18n="legend.workHours"></span>
        <span class="lo" data-i18n="legend.offHours"></span>
      </div>
    </div>

  </div>
</section>

<section id="tab-tasks" class="tab active">
  <div class="tasks-layout">
    <div class="panel">
      <div class="row" style="margin-bottom:12px">
        <button id="btnAddTask" class="btn accent" data-i18n="tasks.add"></button>
        <button id="btnDupTask" class="btn" data-i18n="tasks.duplicate"></button>
        <button id="btnDelTask" class="btn danger" data-i18n="tasks.delete"></button>
      </div>
      <ul id="taskList"></ul>
      <div class="muted small" data-i18n="tasks.priorityHint"></div>
    </div>
    <div class="panel" id="editor"></div>
  </div>
</section>

<section id="tab-schedule" class="tab">
  <div class="schedule-head">
    <div id="status"></div>
    <button id="btnExport" class="btn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      <span data-i18n="sch.export"></span>
    </button>
  </div>
  <div id="ganttwrap"></div>
  <div class="panel" id="detailsPanel" hidden>
    <h2 data-i18n="sch.details"></h2>
    <div class="tablewrap">
      <table id="detailsTable">
        <thead><tr>
          <th>#</th>
          <th data-i18n="sch.colTask"></th>
          <th data-i18n="sch.colStart"></th>
          <th data-i18n="sch.colEnd"></th>
          <th data-i18n="sch.colDuration"></th>
          <th data-i18n="sch.colUnits"></th>
          <th data-i18n="sch.colDeadline"></th>
          <th data-i18n="sch.colStatus"></th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</section>

</main>

<div id="tooltip" class="tooltip" hidden></div>

<div id="modalBack" class="modal-back" hidden>
  <div class="modal" role="dialog" aria-modal="true">
    <h3 id="modalTitle"></h3>
    <div id="modalBody" class="modal-body"></div>
    <div class="modal-foot">
      <button id="modalCancel" class="btn"></button>
      <button id="modalOk" class="btn primary"></button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script src="/static/i18n.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
